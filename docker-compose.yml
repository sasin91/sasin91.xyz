version: '3.8'

services:
  app:
    build: .
    container_name: laravel-octane-frankenphp
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY:?set APP_KEY}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: sasin91
      DB_USERNAME: sasin91_user
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    command: >
      php artisan octane:frankenphp
      --host=0.0.0.0
      --port=8000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - db
      - redis
    networks:
      - sasin91_net

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - sasin91_net

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: sasin91
      MYSQL_USER: sasin91_user
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sasin91_net

networks:
  sasin91_net:
    driver: bridge

volumes:
  db_data:
